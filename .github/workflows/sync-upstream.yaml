name: 'Sync upstream'

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '23 6 * * *' # Daily at 06:23 UTC.
  workflow_dispatch:

concurrency:
  group: sync-upstream-main
  cancel-in-progress: true

jobs:
  sync_upstream:
    name: Sync upstream main
    runs-on: ubuntu-latest
    if: github.repository == 'Youssef-Abdelsalam-2005/Krayin'
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ github.token }}

      - name: Configure git
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/twentyhq/twenty.git
          git fetch origin main
          git fetch upstream main

      - name: Check for upstream changes
        id: upstream
        run: |
          if git merge-base --is-ancestor upstream/main origin/main; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream into sync branch
        if: steps.upstream.outputs.has_changes == 'true'
        run: |
          git checkout -B sync/upstream-main origin/main
          git merge --no-edit upstream/main
          git push --force-with-lease origin HEAD:sync/upstream-main

      - name: Create or update sync pull request
        if: steps.upstream.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing_pr="$(gh pr list --head sync/upstream-main --base main --state open --json number --jq '.[0].number')"

          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" \
              --title "chore: sync upstream main" \
              --body "Automated sync from twentyhq/twenty main into this fork."
          else
            gh pr create \
              --base main \
              --head sync/upstream-main \
              --title "chore: sync upstream main" \
              --body "Automated sync from twentyhq/twenty main into this fork."
          fi
